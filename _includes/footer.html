<footer class="footer-terminal" role="contentinfo">
  <div class="footer-inner">
    <div class="footer-left">
      <span class="footer-bracket">[</span>
      <span class="footer-text">{{ site.agent.station }}</span>
      <span class="footer-bracket">]</span>
    </div>
    <div class="footer-center">
      <span class="footer-copy">© {{ 'now' | date: "%Y" }} {{ site.author }} — ALL COMMS ENCRYPTED</span>
    </div>
    <div class="footer-right">
      <span class="footer-clearance">CLEARANCE: {{ site.agent.clearance }}</span>
    </div>
  </div>
  <div class="footer-scanline"></div>
</footer>
